<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Org Chart</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif}
button{font-family:inherit;cursor:pointer}
:root{--color-primary:#1565C0;--color-primary-dark:#0D47A1;--color-primary-light:#1976D2;--color-primary-faint:#E3F2FD;--color-header-bg:#1565C0;--color-header-text:#FFF;--color-app-bg:#F0F4F8;--color-card-bg:#FFF;--color-card-border:#DDE3EA;--color-card-border-hover:#90CAF9;--color-card-border-selected:#1565C0;--color-card-shadow:rgba(0,0,0,0.08);--color-card-shadow-hover:rgba(0,0,0,0.15);--color-text-heading:#0D1B2A;--color-text-body:#37474F;--color-text-muted:#78909C;--color-connector:#90A4AE;--color-input-border:#B0BEC5;--color-input-border-focus:#1565C0;--color-input-bg:#FFF;--color-error:#C62828;--color-modal-backdrop:rgba(0,0,0,0.45);--color-modal-bg:#FFF;--color-btn-primary-bg:#1565C0;--color-btn-primary-hover:#0D47A1;--color-btn-primary-text:#FFF;--color-btn-secondary-bg:#FFF;--color-btn-secondary-border:#B0BEC5;--color-btn-secondary-hover:#ECEFF1;--color-btn-secondary-text:#37474F;--color-btn-disabled-bg:#CFD8DC;--color-btn-disabled-text:#90A4AE;--dept-engineering:#1565C0;--dept-product:#1976D2;--dept-marketing:#7B1FA2;--dept-sales:#2E7D32;--dept-hr:#E65100;--dept-finance:#00695C;--dept-design:#AD1457;--dept-executive:#4E342E;--dept-other:#455A64;--dept-default:#455A64;--level-gap:48px;--sibling-gap:24px}
html,body{height:100%}
body{display:flex;flex-direction:column;background:var(--color-app-bg);overflow:hidden}
.app-header{height:56px;background:var(--color-header-bg);color:var(--color-header-text);display:flex;align-items:center;justify-content:space-between;padding:0 24px;box-shadow:0 2px 8px rgba(0,0,0,.2);position:sticky;top:0;z-index:100;flex-shrink:0;gap:16px}
.app-header__title{font-size:20px;font-weight:600;display:flex;align-items:center;gap:10px;white-space:nowrap}
.app-header__right{display:flex;align-items:center;gap:16px}
.search-wrap{position:relative;display:flex;align-items:center}
.search-wrap__icon{position:absolute;left:9px;color:rgba(255,255,255,.6);font-size:14px;pointer-events:none}
#search-input{background:rgba(255,255,255,.15);border:1.5px solid rgba(255,255,255,.3);border-radius:6px;color:#fff;font-size:13px;height:32px;padding:0 10px 0 28px;width:200px;outline:none;transition:background 120ms,border-color 120ms}
#search-input::placeholder{color:rgba(255,255,255,.55)}
#search-input:focus{background:rgba(255,255,255,.22);border-color:rgba(255,255,255,.7)}
.zoom-controls{display:flex;align-items:center;gap:6px}
.zoom-controls__btn{width:32px;height:32px;border-radius:6px;border:1.5px solid rgba(255,255,255,.35);background:rgba(255,255,255,.12);color:#FFF;font-size:18px;font-weight:700;display:flex;align-items:center;justify-content:center;transition:background 120ms ease;line-height:1}
.zoom-controls__btn:hover:not(:disabled){background:rgba(255,255,255,.25)}
.zoom-controls__btn:disabled{opacity:.4;cursor:not-allowed}
.zoom-controls__label{font-size:13px;font-weight:600;min-width:44px;text-align:center;color:rgba(255,255,255,.9)}
.zoom-controls__reset{font-size:12px;padding:0 10px;width:auto}
.tree-viewport{overflow:auto;flex:1;padding:40px;min-height:0}
#tree-wrapper{display:inline-block;transform-origin:top center;transition:transform 200ms ease;position:relative;min-width:100%}
.tree{display:flex;flex-direction:column;align-items:center;padding-bottom:40px}
.tree-node{display:flex;flex-direction:column;align-items:center;position:relative}
.children-row{display:flex;flex-direction:row;justify-content:center;gap:var(--sibling-gap);animation:fadeSlideIn 200ms ease-out}
@keyframes fadeSlideIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
#connector-svg{position:absolute;top:0;left:0;pointer-events:none;overflow:visible}
.org-card{min-width:180px;max-width:220px;padding:12px 14px 10px 18px;background:var(--color-card-bg);border:1.5px solid var(--color-card-border);border-radius:8px;box-shadow:0 2px 6px var(--color-card-shadow);position:relative;cursor:pointer;transition:box-shadow 150ms ease,border-color 150ms ease,transform 150ms ease;margin-bottom:var(--level-gap);user-select:none}
.org-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;border-radius:8px 0 0 8px;background:var(--card-accent,var(--dept-default))}
.org-card:hover{border-color:var(--color-card-border-hover);box-shadow:0 4px 12px var(--color-card-shadow-hover);transform:translateY(-2px)}
.org-card.is-selected{border-color:var(--color-card-border-selected);border-width:2px;background:var(--color-primary-faint);box-shadow:0 4px 12px rgba(21,101,192,.2)}
.org-card.is-dimmed{opacity:.28}
.org-card.is-new{animation:newNode 250ms ease-out}
@keyframes newNode{from{opacity:0;transform:scale(.85)}to{opacity:1;transform:scale(1)}}
.org-card__name{font-size:14px;font-weight:600;color:var(--color-text-heading);line-height:1.3;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:160px}
.org-card__title{font-size:12px;color:var(--color-text-body);line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:160px}
.org-card__dept{font-size:11px;color:var(--color-text-muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:160px}
.org-card__actions{display:flex;align-items:center;gap:4px;margin-top:8px;justify-content:flex-end}
.org-card__btn-add,.org-card__btn-toggle{width:24px;height:24px;border-radius:4px;border:1.5px solid var(--color-card-border);background:var(--color-card-bg);cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;transition:background 120ms ease,border-color 120ms ease;flex-shrink:0}
.org-card__btn-add{color:var(--color-primary-light);font-size:16px;font-weight:700}
.org-card__btn-add:hover{background:var(--color-primary-faint);border-color:var(--color-primary-light)}
.org-card__btn-toggle{color:var(--color-text-muted);font-size:11px}
.org-card__btn-toggle:hover{background:#ECEFF1}
.org-card:focus-visible{outline:2px dashed var(--color-primary);outline-offset:2px}
.org-card__btn-delete{width:24px;height:24px;border-radius:4px;border:1.5px solid var(--color-card-border);background:var(--color-card-bg);color:var(--color-text-muted);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background 120ms ease,color 120ms ease,border-color 120ms ease;flex-shrink:0}
.org-card__btn-delete:hover{background:#FFEBEE;border-color:#EF9A9A;color:var(--color-error)}
.btn-destructive{height:38px;padding:0 20px;border:none;border-radius:6px;background:#C62828;color:#FFFFFF;font-size:14px;font-weight:600;font-family:'Segoe UI',system-ui,sans-serif;cursor:pointer;transition:background 120ms ease}
.btn-destructive:hover{background:#B71C1C}
mark{background:#FFF176;color:inherit;border-radius:2px;padding:0 1px}
.modal-backdrop{position:fixed;inset:0;background:var(--color-modal-backdrop);z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;visibility:hidden;transition:opacity 180ms ease,visibility 0ms 180ms}
.modal-backdrop.is-open{opacity:1;visibility:visible;transition:opacity 180ms ease,visibility 0ms 0ms}
.modal{background:var(--color-modal-bg);border-radius:10px;box-shadow:0 8px 32px rgba(0,0,0,.22);padding:28px;width:420px;max-width:calc(100vw - 32px);transform:scale(.95);opacity:0;transition:transform 180ms ease-out,opacity 180ms ease-out}
.modal-backdrop.is-open .modal{transform:scale(1);opacity:1}
.modal__header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.modal__title{font-size:18px;font-weight:600;color:var(--color-text-heading)}
.modal__close{width:32px;height:32px;border-radius:6px;border:none;background:transparent;color:var(--color-text-muted);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.modal__close:hover{background:#ECEFF1}
.modal__subtitle{font-size:13px;color:var(--color-text-muted);margin-bottom:20px}
.modal__subtitle strong{color:var(--color-text-body);font-weight:600}
.modal__divider{height:1px;background:#ECEFF1;margin-bottom:20px}
.form-field{margin-bottom:18px}
.form-field__label{display:block;font-size:13px;font-weight:600;color:var(--color-text-body);margin-bottom:6px}
.form-field__label .required{color:var(--color-error);margin-left:2px}
.form-field__input,.form-field__select{width:100%;height:40px;padding:0 12px;border:1.5px solid var(--color-input-border);border-radius:6px;background:var(--color-input-bg);font-size:14px;color:var(--color-text-heading);font-family:inherit;transition:border-color 120ms ease,box-shadow 120ms ease;outline:none}
.form-field__input:focus,.form-field__select:focus{border-color:var(--color-input-border-focus);box-shadow:0 0 0 3px rgba(21,101,192,.18)}
.form-field__input.has-error{border-color:var(--color-error)}
.form-field__input.has-error:focus{box-shadow:0 0 0 3px rgba(198,40,40,.15)}
.form-field__error{display:none;align-items:center;gap:5px;margin-top:5px;font-size:12px;color:var(--color-error)}
.form-field__error.is-visible{display:flex}
.modal__footer{display:flex;justify-content:flex-end;gap:10px;margin-top:24px}
.btn-secondary{height:38px;padding:0 20px;border:1.5px solid var(--color-btn-secondary-border);border-radius:6px;background:var(--color-btn-secondary-bg);color:var(--color-btn-secondary-text);font-size:14px;font-weight:500;cursor:pointer;transition:background 120ms ease}
.btn-secondary:hover{background:var(--color-btn-secondary-hover)}
.btn-primary{height:38px;padding:0 20px;border:none;border-radius:6px;background:var(--color-btn-primary-bg);color:var(--color-btn-primary-text);font-size:14px;font-weight:600;cursor:pointer;transition:background 120ms ease}
.btn-primary:hover:not(:disabled){background:var(--color-btn-primary-hover)}
.btn-primary:disabled{background:var(--color-btn-disabled-bg);color:var(--color-btn-disabled-text);cursor:not-allowed}
@media(max-width:767px){.app-header{padding:0 16px}.app-header__title{font-size:16px}.zoom-controls__btn{width:40px;height:40px}.org-card{min-width:160px;max-width:190px;padding:10px 12px 10px 16px}.org-card__name{font-size:13px}.org-card__title{font-size:11px}.org-card__btn-add,.org-card__btn-toggle{width:32px;height:32px}.modal{width:calc(100vw - 32px);padding:20px 16px}}
</style>
</head>
<body>
<header class="app-header">
  <div class="app-header__title">&#127970; Org Chart</div>
  <div class="app-header__right">
    <div class="search-wrap">
      <span class="search-wrap__icon">&#128269;</span>
      <input type="text" id="search-input" placeholder="Search people..." aria-label="Search employees">
    </div>
    <div class="zoom-controls">
      <button class="zoom-controls__btn" id="zoom-out" aria-label="Zoom out">&minus;</button>
      <span class="zoom-controls__label" id="zoom-display">100%</span>
      <button class="zoom-controls__btn" id="zoom-in" aria-label="Zoom in">+</button>
      <button class="zoom-controls__btn zoom-controls__reset" id="zoom-reset" aria-label="Reset zoom">Reset</button>
    </div>
  </div>
</header>
<div class="tree-viewport">
  <div id="tree-wrapper">
    <div id="chart-container" class="tree"></div>
    <svg id="connector-svg"></svg>
  </div>
</div>
<div id="delete-modal-overlay" class="modal-backdrop" role="dialog" aria-modal="true" aria-labelledby="delete-modal-title">
  <div class="modal">
    <div class="modal__header">
      <h2 class="modal__title" id="delete-modal-title">Delete Employee</h2>
      <button class="modal__close" id="delete-modal-close-btn" aria-label="Close modal">&#10005;</button>
    </div>
    <div class="modal__divider"></div>
    <div id="delete-modal-body" style="font-size:14px;color:var(--color-text-body);line-height:1.6;"></div>
    <div class="modal__footer">
      <button type="button" class="btn-secondary" id="delete-modal-cancel-btn">Cancel</button>
      <button type="button" class="btn-destructive" id="delete-modal-confirm-btn">Delete</button>
    </div>
  </div>
</div>
<div id="modal-overlay" class="modal-backdrop" role="dialog" aria-modal="true" aria-labelledby="modal-title">
  <div class="modal">
    <div class="modal__header">
      <h2 class="modal__title" id="modal-title">Add Team Member</h2>
      <button class="modal__close" id="modal-close-btn" aria-label="Close modal">&#10005;</button>
    </div>
    <div class="modal__subtitle">Reporting to: <strong id="modal-parent-name"></strong></div>
    <div class="modal__divider"></div>
    <form id="add-member-form" novalidate>
      <div class="form-field">
        <label class="form-field__label" for="field-name">Full Name <span class="required">*</span></label>
        <input class="form-field__input" type="text" id="field-name" autocomplete="off">
        <div class="form-field__error" id="error-name">&#9888; Name is required</div>
      </div>
      <div class="form-field">
        <label class="form-field__label" for="field-title">Job Title <span class="required">*</span></label>
        <input class="form-field__input" type="text" id="field-title" autocomplete="off">
        <div class="form-field__error" id="error-title">&#9888; Title is required</div>
      </div>
      <div class="form-field" style="display:none">
        <label class="form-field__label" for="field-dept">Department</label>
        <select class="form-field__select" id="field-dept">
          <option value="Engineering">Engineering</option><option value="Product">Product</option>
          <option value="Marketing">Marketing</option><option value="Sales">Sales</option>
          <option value="HR">HR</option><option value="Finance">Finance</option>
          <option value="Design">Design</option><option value="Executive">Executive</option>
          <option value="Other">Other</option>
        </select>
      </div>
      <div class="modal__footer">
        <button type="button" class="btn-secondary" id="modal-cancel-btn">Cancel</button>
        <button type="submit" class="btn-primary" id="modal-submit-btn" disabled>Add Employee</button>
      </div>
    </form>
  </div>
</div>
<script>
(function(){
'use strict';
var D=[
{id:"ceo",name:"Sarah Chen",title:"Chief Executive Officer",department:"Executive",parentId:null},
{id:"vp-eng",name:"Marcus Rivera",title:"VP of Engineering",department:"Engineering",parentId:"ceo"},
{id:"vp-prod",name:"Priya Patel",title:"VP of Product",department:"Product",parentId:"ceo"},
{id:"vp-mktg",name:"James O'Brien",title:"VP of Marketing",department:"Marketing",parentId:"ceo"},
{id:"dir-fe",name:"Aiko Tanaka",title:"Director of Frontend Eng",department:"Engineering",parentId:"vp-eng"},
{id:"dir-be",name:"Leon Fischer",title:"Director of Backend Eng",department:"Engineering",parentId:"vp-eng"},
{id:"dir-pm",name:"Chioma Obi",title:"Director of Product Mgmt",department:"Product",parentId:"vp-prod"},
{id:"dir-brand",name:"Tom Nakamura",title:"Director of Brand",department:"Marketing",parentId:"vp-mktg"},
{id:"mgr-ui",name:"Elena Vasquez",title:"UI Engineering Manager",department:"Engineering",parentId:"dir-fe"},
{id:"mgr-api",name:"Kwame Asante",title:"API Engineering Manager",department:"Engineering",parentId:"dir-be"},
{id:"pm-growth",name:"Rania Saleh",title:"Senior Product Manager",department:"Product",parentId:"dir-pm"},
{id:"ic-design",name:"Luca Ferrari",title:"Senior Brand Designer",department:"Marketing",parentId:"dir-brand"}
];
var nm={},cm={},root=null,st={collapsed:new Set(),selected:null,zoom:1,sq:'',mpid:null,nn:null};
var ZMN=0.5,ZMX=1.5,ZST=0.1;
function bx(){nm={};cm={};D.forEach(function(n){nm[n.id]=n;cm[n.id]=[];});D.forEach(function(n){if(n.parentId===null)root=n.id;else if(cm[n.parentId])cm[n.parentId].push(n);});}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function dv(d){var k=(d||'default').toLowerCase().replace(/\s+/g,'-');return'var(--dept-'+k+',var(--dept-default))';}
function gms(q){if(!q)return null;var m=new Set();D.forEach(function(n){if(n.name.toLowerCase().indexOf(q)>=0||n.title.toLowerCase().indexOf(q)>=0||n.department.toLowerCase().indexOf(q)>=0){m.add(n.id);var p=n.parentId;while(p){m.add(p);p=nm[p]?nm[p].parentId:null;}}});return m;}
function hl(t,q){if(!q)return esc(t);var e=esc(t),eq=esc(q),r=new RegExp('('+eq.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');return e.replace(r,'<mark>$1</mark>');}
function render(){var c=document.getElementById('chart-container');if(!root){c.innerHTML='<p>No data</p>';return;}c.innerHTML='';var ms=gms(st.sq);c.appendChild(rn(nm[root],ms));requestAnimationFrame(dc);}
function rn(node,ms){var div=document.createElement('div');div.className='tree-node';var ch=cm[node.id]||[];var hc=ch.length>0;var ic=st.collapsed.has(node.id);var im=ms?ms.has(node.id):true;
var card=document.createElement('div');card.className='org-card';if(st.selected===node.id)card.classList.add('is-selected');if(ms&&!im)card.classList.add('is-dimmed');if(st.nn===node.id){card.classList.add('is-new');st.nn=null;}
card.setAttribute('data-node-id',node.id);card.setAttribute('tabindex','0');card.setAttribute('role','button');if(hc)card.setAttribute('aria-expanded',String(!ic));card.style.setProperty('--card-accent',dv(node.department));
var q=st.sq;var isRoot=(node.parentId===null);var delBtn=isRoot?'':'<button class="org-card__btn-delete" data-action="delete-node" data-node-id="'+node.id+'" title="Delete" aria-label="Delete '+esc(node.name)+'">&#128465;</button>';
card.innerHTML='<div class="org-card__name">'+hl(node.name,q)+'</div><div class="org-card__title">'+hl(node.title,q)+'</div><div class="org-card__dept">'+hl(node.department,q)+'</div><div class="org-card__actions">'+delBtn+'<button class="org-card__btn-add" data-action="add-child" data-node-id="'+node.id+'" title="Add report" aria-label="Add report to '+esc(node.name)+'">+</button>'+(hc?'<button class="org-card__btn-toggle" data-action="toggle" data-node-id="'+node.id+'" title="'+(ic?'Expand':'Collapse')+'" aria-label="'+(ic?'Expand':'Collapse')+' children">'+(ic?'\u25B6':'\u25BC')+'</button>':'')+'</div>';
div.appendChild(card);if(hc&&!ic){var row=document.createElement('div');row.className='children-row';ch.forEach(function(child){row.appendChild(rn(child,ms));});div.appendChild(row);}return div;}
function dc(){var svg=document.getElementById('connector-svg'),w=document.getElementById('tree-wrapper');if(!svg||!w)return;var wr=w.getBoundingClientRect(),sc=st.zoom,cards=w.querySelectorAll('.org-card[data-node-id]'),cr={};cards.forEach(function(c){cr[c.getAttribute('data-node-id')]=c.getBoundingClientRect();});var p='';
cards.forEach(function(card){var nid=card.getAttribute('data-node-id');if(st.collapsed.has(nid))return;var ch=cm[nid]||[];if(!ch.length)return;var pr=cr[nid];if(!pr)return;var px=(pr.left+pr.width/2-wr.left)/sc,py=(pr.bottom-wr.top)/sc;
ch.forEach(function(child){var crc=cr[child.id];if(!crc)return;var cx=(crc.left+crc.width/2-wr.left)/sc,cy=(crc.top-wr.top)/sc,my=(py+cy)/2;p+='<path d="M '+px+' '+py+' L '+px+' '+my+' L '+cx+' '+my+' L '+cx+' '+cy+'" fill="none" stroke="#90A4AE" stroke-width="2"/>';});});
svg.setAttribute('width',w.scrollWidth/sc);svg.setAttribute('height',w.scrollHeight/sc);svg.innerHTML=p;}
var ov=document.getElementById('modal-overlay'),pn=document.getElementById('modal-parent-name'),ni=document.getElementById('field-name'),ti=document.getElementById('field-title'),ds=document.getElementById('field-dept'),sb=document.getElementById('modal-submit-btn'),en=document.getElementById('error-name'),et=document.getElementById('error-title');
function sm(pid){st.mpid=pid;var par=nm[pid];pn.textContent=par?par.name:'';ni.value='';ti.value='';ds.value=par?par.department:'Engineering';sb.disabled=true;en.classList.remove('is-visible');et.classList.remove('is-visible');ni.classList.remove('has-error');ti.classList.remove('has-error');ov.classList.add('is-open');ni.focus();}
function hm(){ov.classList.remove('is-open');st.mpid=null;}
function vf(){sb.disabled=!(ni.value.trim()&&ti.value.trim());}
function hs(e){e.preventDefault();var n=ni.value.trim(),t=ti.value.trim(),ok=true;if(!n){en.classList.add('is-visible');ni.classList.add('has-error');ok=false;}else{en.classList.remove('is-visible');ni.classList.remove('has-error');}if(!t){et.classList.add('is-visible');ti.classList.add('has-error');ok=false;}else{et.classList.remove('is-visible');ti.classList.remove('has-error');}if(!ok)return;var nn={id:'node-'+Date.now(),name:n,title:t,department:ds.value,parentId:st.mpid};D.push(nn);st.nn=nn.id;st.collapsed.delete(st.mpid);bx();hm();render();}
ni.addEventListener('input',function(){vf();en.classList.remove('is-visible');ni.classList.remove('has-error');});
ti.addEventListener('input',function(){vf();et.classList.remove('is-visible');ti.classList.remove('has-error');});
ni.addEventListener('blur',function(){if(!ni.value.trim()){en.classList.add('is-visible');ni.classList.add('has-error');}});
ti.addEventListener('blur',function(){if(!ti.value.trim()){et.classList.add('is-visible');ti.classList.add('has-error');}});
document.getElementById('add-member-form').addEventListener('submit',hs);
document.getElementById('modal-cancel-btn').addEventListener('click',hm);
document.getElementById('modal-close-btn').addEventListener('click',hm);
ov.addEventListener('click',function(e){if(e.target===ov)hm();});
document.addEventListener('keydown',function(e){if(e.key==='Escape'){if(dov.classList.contains('is-open')){cdm();return;}if(ov.classList.contains('is-open'))hm();}});
